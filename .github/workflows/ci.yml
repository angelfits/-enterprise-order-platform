name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Test User Service
        run: |
          cd user-service
          chmod +x mvnw
          ./mvnw clean verify

      - name: Build Eureka Server
        run: |
          cd eureka-server
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Build API Gateway
        run: |
          cd api-gateway
          chmod +x mvnw
          ./mvnw clean package -DskipTests